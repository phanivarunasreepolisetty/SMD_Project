{% extends 'base.html' %}

{% block title %}Edit Patient - Smart Medicine Dispenser{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-container">
        <div class="form-header">
            <a href="{{ url_for('caretaker.patient_detail', id=patient.id) }}" class="back-link">← Back to {{
                patient.name }}</a>
            <h1>Edit Patient</h1>
        </div>

        <form method="POST" action="{{ url_for('caretaker.edit_patient', id=patient.id) }}" class="styled-form">
            <div class="form-section">
                <h3>Personal Information</h3>

                <div class="form-group">
                    <label for="name">Full Name <span class="required">*</span></label>
                    <input type="text" id="name" name="name" required value="{{ patient.name }}" class="form-input">
                </div>

                <div class="form-row two-col">
                    <div class="form-group">
                        <label for="age">Age <span class="required">*</span></label>
                        <input type="number" id="age" name="age" required value="{{ patient.age }}" min="1" max="120"
                            class="form-input">
                    </div>
                    <div class="form-group">
                        <label for="gender">Gender <span class="required">*</span></label>
                        <select id="gender" name="gender" required class="form-input">
                            <option value="Male" {% if patient.gender=='Male' %}selected{% endif %}>Male</option>
                            <option value="Female" {% if patient.gender=='Female' %}selected{% endif %}>Female</option>
                            <option value="Other" {% if patient.gender=='Other' %}selected{% endif %}>Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="medical_conditions">Medical Conditions</label>
                    <textarea id="medical_conditions" name="medical_conditions" class="form-input"
                        rows="3">{{ patient.medical_conditions or '' }}</textarea>
                </div>
            </div>

            <div class="form-section">
                <h3>Security</h3>
                <div class="form-group">
                    <label for="pin_code">Patient PIN</label>
                    <input type="password" id="pin_code" name="pin_code" value="{{ patient.pin_code or '' }}"
                        maxlength="6" placeholder="Leave blank to keep current" class="form-input">
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-lg">Save Changes</button>
                <a href="{{ url_for('caretaker.patient_detail', id=patient.id) }}"
                    class="btn btn-outline btn-lg">Cancel</a>
            </div>
        </form>

        <div class="danger-zone">
            <h3>Danger Zone</h3>
            <form method="POST" action="{{ url_for('caretaker.delete_patient', id=patient.id) }}"
                onsubmit="return confirm('Are you sure? This will deactivate the patient.');">
                <button type="submit" class="btn btn-danger">Deactivate Patient</button>
            </form>
        </div>
    </div>
</div>

<style>
    .danger-zone {
        margin-top: var(--spacing-2xl);
        padding: var(--spacing-lg);
        background: var(--danger-bg);
        border-radius: var(--radius-lg);
        border: 1px solid var(--danger);
    }

    .danger-zone h3 {
        color: var(--danger);
        margin-bottom: var(--spacing-md);
    }
</style>
{% endblock %}
